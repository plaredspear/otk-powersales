version: 0.2

# AWS_DEFAULT_REGION, IMAGE_REPO_NAME, STAGE, PROJECT, ACM_CERT_ARN 은
# CodeBuild 프로젝트 환경변수로 콘솔에서 직접 주입한다. 스테이지/계정에
# 종속되는 값을 buildspec 에 하드코딩하지 않는다. RDS_* / REDIS_* 는 EB 콘솔의
# 환경 속성(Configuration → Software)에서 직접 입력하므로 buildspec 에서
# 다루지 않는다.

env:
  variables:
    # Dockerfile 의 `--mount=type=cache` 해석을 위해 BuildKit 이 필요.
    # Docker 24+ 의 내장 frontend 가 cache mount 를 stable 지원하므로
    # `# syntax=...` 디렉티브는 사용하지 않는다 (Docker Hub rate limit 회피).
    # CodeBuild 프로젝트에서 Local Cache > DOCKER_LAYER_CACHE 를 활성화해야
    # /var/lib/docker (BuildKit state 포함) 가 빌드 간 보존된다.
    DOCKER_BUILDKIT: "1"

phases:
  pre_build:
    on-failure: ABORT
    commands:
      - echo "Logging in to Amazon ECR..."
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}-$(date +%Y%m%d%H%M%S)"
      - IMAGE_URI="${ECR_URI}/${IMAGE_REPO_NAME}:${IMAGE_TAG}"
      - echo "Image will be tagged as ${IMAGE_URI}"

  build:
    # CodeBuild 기본 동작은 build phase 실패 시 post_build 로 fall through 한다.
    # Dockerfile RUN 단계에서 테스트가 실패하면 그대로 docker push / artifact 생성이
    # 이어져 ECR 에 부분 이미지나 잘못된 artifact 가 흘러갈 수 있어, 명시적으로 ABORT 한다.
    on-failure: ABORT
    commands:
      - echo "Building Docker image..."
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG ./backend
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $IMAGE_URI
      - |
        # prod ECR 은 Tag immutability=ON 이라 latest 재push 불가.
        # dev 에서만 latest 를 유지해 디버깅 편의를 남긴다.
        if [ "${STAGE}" != "prod" ]; then
          docker tag $IMAGE_REPO_NAME:$IMAGE_TAG "${ECR_URI}/${IMAGE_REPO_NAME}:latest"
        fi

  post_build:
    commands:
      - echo "Pushing Docker image to ECR..."
      - docker push $IMAGE_URI
      - |
        if [ "${STAGE}" != "prod" ]; then
          docker push "${ECR_URI}/${IMAGE_REPO_NAME}:latest"
        fi
      - echo "Image pushed successfully - ${IMAGE_URI}"
      - echo "Copying .ebextensions for EB deployment..."
      - cp -r backend/.ebextensions .ebextensions
      - |
        # ---------------------------------------------------------------------
        # Spring 프로파일 및 메타 env 만 .ebextensions/env.config 로 주입한다.
        # RDS_* / REDIS_* 는 EB 콘솔의 환경 속성(Configuration → Software)에서
        # 직접 입력한다 — env.config 에 나열하지 않은 키는 EB 가 기존 값을
        # 그대로 유지하므로 배포마다 덮어쓰이지 않는다.
        # ---------------------------------------------------------------------
        set -eu
        cat > .ebextensions/env.config <<EOFENV
        option_settings:
          aws:elasticbeanstalk:application:environment:
            SPRING_PROFILES_ACTIVE: "${STAGE}"
            STAGE: "${STAGE}"
            PROJECT: "${PROJECT}"
            AWS_REGION: "${AWS_DEFAULT_REGION}"
        EOFENV
      - |
        # ---------------------------------------------------------------------
        # HTTP(80) → HTTPS(443) 리다이렉트 + HTTPS 리스너 구성.
        # ACM_CERT_ARN 은 CodeBuild 환경변수로 주입한다 (스테이지별 상이 가능).
        # Rebuild 시에도 .ebextensions 가 재적용되어 리다이렉트가 유지된다.
        # ---------------------------------------------------------------------
        set -eu
        : "${ACM_CERT_ARN:?ACM_CERT_ARN must be set in CodeBuild env}"
        cat > .ebextensions/https-redirect.config <<EOFHTTPS
        option_settings:
          aws:elbv2:listener:443:
            ListenerEnabled: 'true'
            Protocol: HTTPS
            SSLCertificateArns: ${ACM_CERT_ARN}
            DefaultProcess: default

        Resources:
          AWSEBV2LoadBalancerListener:
            Type: AWS::ElasticLoadBalancingV2::Listener
            Properties:
              LoadBalancerArn:
                Ref: AWSEBV2LoadBalancer
              Port: 80
              Protocol: HTTP
              DefaultActions:
                - Type: redirect
                  RedirectConfig:
                    Protocol: HTTPS
                    Port: '443'
                    Host: '#{host}'
                    Path: '/#{path}'
                    Query: '#{query}'
                    StatusCode: HTTP_301
        EOFHTTPS
      - echo "Generating Dockerrun.aws.json for EB deployment..."
      - |
        cat > Dockerrun.aws.json <<EOFDR
        {
          "AWSEBDockerrunVersion": "1",
          "Image": {
            "Name": "${IMAGE_URI}",
            "Update": "true"
          },
          "Ports": [
            { "ContainerPort": 8080 }
          ]
        }
        EOFDR

artifacts:
  files:
    - Dockerrun.aws.json
    - .ebextensions/**/*


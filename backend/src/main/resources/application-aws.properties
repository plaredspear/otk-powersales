# AWS 프로파일 — EB 에서 buildspec 이 SPRING_PROFILES_ACTIVE=aws 를 주입해 활성화.
# env var (RDS_*, REDIS_*, RDS_SECRET_ARN) 는 .ebextensions/env.config 가 배포
# 시점에 SSM Parameter Store 로부터 채워 주입한다.

# baseline 의 spring.autoconfigure.exclude 를 해제해 DB/Redis auto-config 활성화.
spring.autoconfigure.exclude=

# ---------------------------------------------------------------------------
# Secrets Manager 에서 RDS 비밀번호 로드.
# RDS 관리형 secret 의 JSON 포맷: {"username":"...","password":"...","host":"...",
# "port":5432,"dbInstanceIdentifier":"...","engine":"postgres"}
# spring-cloud-aws 가 JSON 필드를 Spring property 로 풀어주므로
# ${password} placeholder 로 바로 사용할 수 있다.
# ---------------------------------------------------------------------------
spring.config.import=aws-secretsmanager:${RDS_SECRET_ARN}
spring.cloud.aws.region.static=${AWS_REGION}

# ---------------------------------------------------------------------------
# DataSource — PostgreSQL (RDS)
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${RDS_HOST}:${RDS_PORT}/postgres
spring.datasource.username=${RDS_USERNAME}
spring.datasource.password=${password}

# JPA: 스키마 검증만. 실제 마이그레이션은 별도 도구 (Flyway/Liquibase) 도입 시 교체.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------------
# Redis (ElastiCache / Valkey)
# ---------------------------------------------------------------------------
spring.data.redis.host=${REDIS_ENDPOINT}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.timeout=2s

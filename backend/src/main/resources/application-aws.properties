# AWS 프로파일 — EB 에서 buildspec 이 SPRING_PROFILES_ACTIVE=aws 를 주입해 활성화.
# 현재 단계에서는 DB/Redis 연결 코드가 제외되어 있으므로 관련 설정
# (spring.config.import=aws-secretsmanager, spring.datasource.*, spring.jpa.*,
# spring.data.redis.*) 도 함께 비활성화한다. 복구 시 build.gradle.kts 주석 해제와
# 더불어 이 파일도 원상 복원하고, buildspec.yml 의 SSM fetch 블록을 되살린다.

# 현재는 aws 프로파일 전용 추가 설정이 없다. AWS 리전 정보 등 공통 값은
# buildspec 이 env var(AWS_REGION 등) 로 주입해 application.properties 가 소비한다.

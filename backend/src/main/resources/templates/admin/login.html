<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 - 파워세일즈 관리시스템</title>
    <link th:href="@{/admin/vendor/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/admin/css/admin.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">파워세일즈 관리시스템</h3>

                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert"
                         th:text="${errorMessage}"></div>
                    <div th:if="${deniedMessage}" class="alert alert-warning" role="alert"
                         th:text="${deniedMessage}"></div>
                    <div th:if="${logoutMessage}" class="alert alert-info" role="alert"
                         th:text="${logoutMessage}"></div>

                    <form th:action="@{/admin/login}" method="post">
                        <div class="mb-3">
                            <label for="employeeId" class="form-label">사번</label>
                            <input type="text" class="form-control" id="employeeId" name="employeeId"
                                   pattern="\d{8}" maxlength="8"
                                   placeholder="8자리 사번 입력" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   minlength="4" placeholder="비밀번호 입력" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">로그인</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>대시보드</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">대시보드</h2>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">환영합니다</h5>
            <p class="card-text">
                <span th:text="${userName}">사용자</span>님,
                파워세일즈 관리시스템입니다.
            </p>
            <p class="text-muted">후속 스펙에서 대시보드 기능이 구현될 예정입니다.</p>
        </div>
    </div>
</div>
</body>
</html>

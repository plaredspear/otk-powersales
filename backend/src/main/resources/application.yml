spring:
  application:
    name: otoki-powersales-backend

  # -------------------------------------------------------------------------
  # Redis (ElastiCache Valkey, 클러스터 모드 + 전송 중 암호화) — EB (dev/prod)
  # 공통. REDIS_ENDPOINT 는 구성 엔드포인트(clustercfg.*) 호스트, REDIS_PORT 는
  # 6379. 두 값 모두 EB 콘솔의 환경 속성(Configuration → Software)에서 직접
  # 입력해 주입한다. Lettuce 가 구성 엔드포인트를 seed 로 클러스터 토폴로지를
  # 자동 감지해 개별 샤드 노드로 직접 접속한다.
  #
  # local 프로파일에서는 application-local.yml 이 RedisAutoConfiguration 을
  # exclude 하므로 아래 미해결 placeholder 는 바인딩되지 않아 안전하다.
  # -------------------------------------------------------------------------
  data:
    redis:
      cluster:
        nodes: ${REDIS_ENDPOINT}:${REDIS_PORT}
      ssl:
        enabled: true
      timeout: 2s

  # -------------------------------------------------------------------------
  # DataSource — PostgreSQL (Aurora). host/port/username/dbname 은 EB 환경
  # 속성으로 주입하고, **password 만** RDS 관리형 master password secret 에서
  # 읽는다. 관리형 master password secret 의 JSON 은 엔진/생성 경로에 따라
  # `{"username": "...", "password": "..."}` 만 담겨 올 때가 있어 host/port
  # 까지 secret 에 의존하면 placeholder 가 미해결되며 JDBC URL 이 깨진다.
  # password 만 secret 에서 받고 나머지는 env 로 두면 secret JSON 포맷과
  # 무관하게 항상 동작한다.
  #
  # dev/prod document 의 spring.config.import 가 부팅 시 secret 을 1회 읽어
  # `${password}` placeholder 를 바인딩한다. local 프로파일에서는 Secrets
  # Manager 를 사용하지 않고 RDS_PASSWORD 환경변수로 비밀번호를 직접 주입한다
  # (자격증명 의존 제거). 따라서 placeholder 는
  #   ${RDS_PASSWORD:${password}}
  # 로 두 단계 fallback 한다 — local 은 RDS_PASSWORD, dev/prod 는 Secrets
  # Manager 가 채운 `${password}` 가 사용된다.
  # -------------------------------------------------------------------------
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${RDS_HOST}:${RDS_PORT}/${RDS_DATABASE:postgres}
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD:${password}}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:5}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      connection-timeout: 30000

  jpa:
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:true}
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        default_schema: powersales

  flyway:
    schemas: powersales
    baseline-on-migrate: true
    baseline-version: 0
    enabled: true

  # 모바일 앱 패키지(APK/IPA) 업로드를 위해 multipart 상한을 상향 (기본 1MB/10MB).
  # 패키지 자체 크기 검증은 StorageConstants.APP_PACKAGE_MAX_BYTES(500MB) 가 담당.
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB

  jackson:
    time-zone: Asia/Seoul
  web:
    error:
      include-message: always
      include-binding-errors: always

# ---------------------------------------------------------------------------
# Actuator — /actuator/health 만 노출. show-details=always 는 web UI 에서
# DB/Redis 상태 카드를 렌더링하기 위함. EB Load Balancer 헬스체크 경로도 동일.
# /api/health 외부 엔드포인트는 별도 HealthController 가 제공.
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

jwt:
  # access: 1시간 (3600000ms). 짧게 유지해 폐기(revocation) 지연을 줄인다.
  #   refresh 회전이 7일 롤링 세션을 유지하므로 사용자 체감 변화는 없다.
  # refresh: 7일 (604800000ms). 회전 시 TTL 재부여되는 슬라이딩 윈도우 = 비활동 한계.
  secret: ${JWT_SECRET:otoki-internal-dev-secret-key-change-in-production-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# ---------------------------------------------------------------------------
# SAP 인바운드 인증
#  - client_secret 평문 저장 금지. BCrypt 해시만 보관
#  - jwt_signing_key 는 mobile/admin JWT 와 별도 (256-bit 이상)
#  - allowed_ips 는 비어 있으면 backend 단 IP 검증 비활성 (ALB 단에 위임)
# ---------------------------------------------------------------------------
sap:
  auth:
    client-id: ${SAP_CLIENT_ID:}
    client-secret-hash: ${SAP_CLIENT_SECRET_HASH:}
    jwt-signing-key: ${SAP_JWT_SIGNING_KEY:otoki-sap-inbound-dev-signing-key-change-in-production-256-bits}
    token-ttl-seconds: 86400
    allowed-scopes:
      - sap.org.write
      - sap.employee.write
      - sap.account.write
      - sap.product.write
      - sap.sales.write
      - sap.order.write
      - sap.attendance.write
    allowed-ips: ${SAP_ALLOWED_IPS:}
  inbound:
    sales:
      chunk-size: 1000
      max-rows: 50000
    attendance:
      chunk-size: 1000
      max-rows: 50000
  outbound:
    base-url: ${SAP_OUTBOUND_BASE_URL:}
    username: ${SAP_OUTBOUND_USERNAME:}
    password: ${SAP_OUTBOUND_PASSWORD:}
    connect-timeout-ms: ${SAP_OUTBOUND_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${SAP_OUTBOUND_READ_TIMEOUT_MS:10000}
    retry:
      max-attempts: ${SAP_OUTBOUND_RETRY_MAX_ATTEMPTS:3}
      delay-ms: ${SAP_OUTBOUND_RETRY_DELAY_MS:1000}

# ---------------------------------------------------------------------------
# SF 통합 설정 — 인바운드 OAuth + 아웃바운드 Apex REST relay
#   - inbound: SF → backend 호출용 OAuth 2.0 (client_credentials grant)
#       SAP 와 격리된 별도 시스템. IP allowlist 없음.
#   - outbound: backend → SF Apex REST relay (예: IF_REST_MOBILE_ClaimRegist).
#       OAuth 2.0 password grant 로 access_token 발급 → in-memory 캐싱 →
#       401 응답 시 1회 재발급 + 재시도.
#   - local / test 에서는 placeholder 가 비어 있어도 빈은 생성되지만 실제 호출
#     시 명시적 예외 발생 (운영 환경 misconfiguration 검출).
# ---------------------------------------------------------------------------
sf:
  auth:
    client-id: ${SF_INBOUND_CLIENT_ID:}
    client-secret-hash: ${SF_INBOUND_CLIENT_SECRET_HASH:}
    jwt-signing-key: ${SF_INBOUND_JWT_SIGNING_KEY:otoki-sf-inbound-dev-signing-key-change-in-production-256-bits}
    token-ttl-seconds: 86400
    allowed-scopes:
      - sf.write
  inbound:
    sales:
      chunk-size: 1000
      max-rows: 50000
  outbound:
    apex-base-url: ${SF_APEX_REST_BASE_URL:}
    oauth:
      token-url: ${SF_OAUTH_TOKEN_URL:}
      client-id: ${SF_OAUTH_CLIENT_ID:}
      client-secret: ${SF_OAUTH_CLIENT_SECRET:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

# ---------------------------------------------------------------------------
# 앱 구성 값 (모든 스테이지 공통 placeholder). 실제 값은 프로파일 별 파일에서
# 채워지거나 env var 로 주입된다.
#
# aws.s3.bucket 은 향후 S3 기능에서 사용할 대상 버킷 이름으로, EB 콘솔 환경
# 속성(S3_BUCKET) 으로 주입한다. local 프로파일은 S3 auto-config 가 exclude
# 되므로 값이 비어 있어도 기동에 영향이 없다.
# ---------------------------------------------------------------------------
app:
  stage: ${STAGE:local}
  aws:
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${S3_BUCKET:}
      public-url-prefix: ${S3_PUBLIC_URL_PREFIX:}
  domain:
    api: ${API_DOMAIN:}
    admin: ${ADMIN_DOMAIN:}

  auth:
    uuid-check:
      enabled: ${UUID_CHECK_ENABLED:true}
      # 00000009 는 전 환경(local/dev/prod) 공통 단말 바인딩 면제 사번.
      # 20030239 는 local/dev 프로필에서만 추가 면제 (application-local.yml /
      # 아래 dev 전용 document 참조). UUID_CHECK_EXCLUDED 환경변수 주입 시
      # 이 기본값은 override 되므로, dev/prod EB 에 해당 환경변수를 설정하지 않는다.
      excluded-employee-codes: "${UUID_CHECK_EXCLUDED:00000009}"

  attendance:
    gps-threshold-meters: ${ATTENDANCE_GPS_THRESHOLD_METERS:500}

  # ---------------------------------------------------------------------------
  # @Async 후처리 executor (AsyncConfig)
  #  - max-pool-size 는 HikariCP maximum-pool-size(기본 5)보다 작게 — @Async 작업이
  #    REQUIRES_NEW 로 커넥션을 잡으므로 풀 초과 시 커넥션 대기로 스레드 블로킹 점유.
  #  - queue-capacity 유한값 + CallerRunsPolicy 로 무한 적재 차단 + 배압 형성.
  # ---------------------------------------------------------------------------
  async:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE:2}
    max-pool-size: ${ASYNC_MAX_POOL_SIZE:4}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:500}
    await-termination-seconds: ${ASYNC_AWAIT_TERMINATION_SECONDS:30}

  # ---------------------------------------------------------------------------
  # ORORA 매출이력 RDS 적재 배치 (Spec #855)
  #  - 거래처 코드 범위(from~to)를 chunk 단위로 분할해 ORORA view 를 조회 후 RDS upsert.
  #  - 레거시 OroraDailyAccountRange__mdt 실측값(from 1000000 / to 1100000 / range 2000) 기본.
  #  - cron 은 dev/prod 만 실 발동 (ORORA DataSource @Profile("dev | prod")). @EnableScheduling
  #    전역 비활성 상태에서는 fire 안 됨 — 활성화 시 즉시 시작.
  # ---------------------------------------------------------------------------
  batch:
    orora:
      # ORORA view SELECT 지연 상한 (ms). ORORA 외부 view 의 무거운 chunk SELECT 가 수십초 이상
      # 걸려 짧은 상한은 chunk 적재를 `The query has timed out.` 으로 실패시킨다 (운영 실측 30초 timeout
      # 사건). 기본 300초. JpaTransactionManager.defaultTimeout 도 이 값(초 환산)과 정합된다.
      query-timeout-ms: ${ORORA_QUERY_TIMEOUT_MS:300000}
      account-range:
        from: ${ORORA_MATERIALIZE_ACCOUNT_FROM:1000000}
        to: ${ORORA_MATERIALIZE_ACCOUNT_TO:1100000}
        # chunk 당 거래처 코드 폭. 폭이 클수록 chunk 단일 SELECT 가 무거워져 timeout 위험 ↑.
        # 레거시 mdt 실측은 2000 이었으나 timeout 회피 위해 기본 1000 으로 축소.
        chunk-size: ${ORORA_MATERIALIZE_CHUNK_SIZE:1000}
      daily:
        cron: ${ORORA_MATERIALIZE_DAILY_CRON:0 30 4 * * *}
      monthly:
        # 월 1회 — 매월 3일 05:00 KST (레거시 익월 초 전월분 적재 분포 정합)
        cron: ${ORORA_MATERIALIZE_MONTHLY_CRON:0 0 5 3 * *}

  # ---------------------------------------------------------------------------
  # ORORA 외부 MSSQL DB 직결 DataSource
  #  - dev / prod 프로파일에서만 빈이 활성화된다 (`@Profile("dev | prod")`).
  #  - local / test 에서는 환경변수 미설정 상태에서도 정상 기동 (Bean 부재).
  #  - JDBC URL = `jdbc:sqlserver://${host};databaseName=${database};encrypt=${encrypt}`
  #    (포트 명시 없음 — MSSQL 1433 기본 사용).
  #  - v1.0 기본은 `encrypt=false` — Orora 측 TLS 가용성 미확정. 향후 운영에서 TLS
  #    가용성이 확인되면 ORORA_DB_ENCRYPT=true 로 환경변수 토글.
  # ---------------------------------------------------------------------------
  datasource:
    orora:
      host: ${ORORA_DB_HOST:}
      database: ${ORORA_DB_NAME:}
      username: ${ORORA_DB_USER:}
      password: ${ORORA_DB_PASSWORD:}
      encrypt: ${ORORA_DB_ENCRYPT:false}
      trust-server-certificate: ${ORORA_DB_TRUST_CERT:false}
      hikari:
        pool-name: ororaHikariPool
        maximum-pool-size: 5
        minimum-idle: 1
        idle-timeout: 600000
        max-lifetime: 1500000
        keepalive-time: 120000
        connection-test-query: "SELECT 1"
        connection-timeout: 5000
        validation-timeout: 3000
        read-only: true
        auto-commit: true
        initialization-fail-timeout: -1

    # -------------------------------------------------------------------------
    # POS 외부 PostgreSQL DB 직결 DataSource (전산매출 = 레거시 live_tot_sales_dh)
    #  - 레거시 Heroku `PosMapper.xml`(datasource=pos) 가 쓰던 별도 POS DB.
    #  - 메인 RDS 와 분리된 read-only 직결. ORORA datasource 와 동일한 fail-tolerant 정책
    #    (initialization-fail-timeout=-1) — POS DB 도달 불가 시에도 메인 기동 무영향.
    #  - 접속정보는 배포 환경 변수(POS_DB_*)로 주입. 미설정(local/test) 시 빈은 등록되나
    #    호출 site 가 없으면 connection acquire 자체가 발생하지 않음.
    # -------------------------------------------------------------------------
    pos:
      host: ${POS_DB_HOST:}
      port: ${POS_DB_PORT:5432}
      database: ${POS_DB_NAME:}
      username: ${POS_DB_USER:}
      password: ${POS_DB_PASSWORD:}
      hikari:
        pool-name: posHikariPool
        maximum-pool-size: 5
        minimum-idle: 1
        idle-timeout: 600000
        max-lifetime: 1500000
        keepalive-time: 120000
        connection-test-query: "SELECT 1"
        connection-timeout: 5000
        validation-timeout: 3000
        read-only: true
        auto-commit: true
        initialization-fail-timeout: -1

  # ---------------------------------------------------------------------------
  # SAP outbound — 출근/진열 마스터 daily batch
  # cron 표현식과 page-size 는 Part 별로 독립. 인증/baseUrl/timeout 은 위
  # `sap.outbound.*` 환경변수를 그대로 재사용한다.
  # ---------------------------------------------------------------------------
  sap:
    outbound:
      attendance:
        cron: ${APP_SAP_OUTBOUND_TEAM_MEMBER_SCHEDULE_CRON:0 0 1 * * *}
        page-size: ${APP_SAP_OUTBOUND_TEAM_MEMBER_SCHEDULE_PAGE_SIZE:100}
      display:
        # 매일 23:00 KST (SF CronTrigger "여사원 진열마스터 스케쥴" `0 0 23 ? * 1-7` Asia/Seoul 운영 실측 정합)
        cron: ${APP_SAP_OUTBOUND_DISPLAY_CRON:0 0 23 * * *}
        page-size: ${APP_SAP_OUTBOUND_DISPLAY_PAGE_SIZE:100}
      ppt-master:
        # 매일 정오 12:00 KST 1회 (SF CronTrigger "전문행사조 SAP 송신 배치" `0 0 12 ? * 1-7` Asia/Seoul 운영 실측 정합)
        cron: ${APP_SAP_OUTBOUND_PPT_MASTER_CRON:0 0 12 * * *}
        page-size: ${APP_SAP_OUTBOUND_PPT_MASTER_PAGE_SIZE:100}

  # ---------------------------------------------------------------------------
  # Naver Cloud Map Geocode API
  # API Key 발급: NCP 콘솔 → Application Services → Maps → Geocoding 신청 후
  # X-NCP-APIGW-API-KEY-ID / X-NCP-APIGW-API-KEY 발급
  # ---------------------------------------------------------------------------
  naver:
    geocode:
      client-id: ${NAVER_GEOCODE_CLIENT_ID:}
      client-secret: ${NAVER_GEOCODE_CLIENT_SECRET:}

  # ---------------------------------------------------------------------------
  # FCM (Firebase Cloud Messaging) push 발송 (FcmProperties)
  #  - enabled + credential-s3-key 가 모두 채워질 때만 RealFcmSender 가 초기화되어 실발송.
  #    둘 중 하나라도 미충족이면 no-op (부팅/배치 실패 없이 graceful skip).
  #  - credential-s3-key 는 Firebase 서비스 계정 키 JSON 을 담은 비공개 S3 객체 key
  #    (예: config/fcm/service-account.json). EB 인스턴스 IAM 으로 S3 GetObject 접근한다.
  #    버킷은 반드시 퍼블릭 액세스 차단 상태여야 한다. 키 원문을 코드/yml/환경변수에 두지 않는다.
  #  - 코드 기본은 비활성(false) — dev/prod 에 FCM_ENABLED=true + FCM_CREDENTIAL_S3_KEY 를 설정해 켠다.
  #  - local 은 StubFcmSender(@Profile("local")) 라 이 설정과 무관하게 로그만 남긴다.
  # ---------------------------------------------------------------------------
  push:
    fcm:
      enabled: ${FCM_ENABLED:false}
      credential-s3-key: ${FCM_CREDENTIAL_S3_KEY:}

server:
  port: ${SERVER_PORT:8080}
  # forward-headers-strategy 전역 설정 금지: ForwardedHeaderFilter 가 X-Forwarded-For 를
  # 요청에서 제거해 SAP/SF 인바운드 ClientIpResolver(IP allowlist/audit) 가 클라이언트
  # 실 IP 를 잃는다. 프록시 뒤 https 절대 URL 보정은 필요한 곳에서 개별 처리
  # (MobileAppPackageController.currentBaseUrl 참조).

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.otoki.powersales: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_HIBERNATE_BIND:TRACE}

---
# ---------------------------------------------------------------------------
# dev/prod 전용 — RDS 관리형 master password secret 을 Secrets Manager 에서
# 로드한다. 부팅 시 1회 호출되고 메모리에 캐시되므로 rotation 을 켜려면 별도
# 재시작/rolling restart 전략이 동반되어야 한다 (현 정책: rotation off).
#
# RDS_SECRET_ARN / AWS_REGION 은 EB 콘솔 환경 속성으로 주입한다.
# local 에서는 이 document 가 활성화되지 않아 Secrets Manager 호출이 일어나지
# 않고, 미해결 placeholder 도 바인딩되지 않는다.
# ---------------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: "dev | prod"
    import: "aws-secretsmanager:${RDS_SECRET_ARN}"
  cloud:
    aws:
      region:
        static: ${AWS_REGION}

---
# ---------------------------------------------------------------------------
# prod 전용 — API 문서 비활성화 (보안)
# Swagger UI / OpenAPI JSON 모두 비활성화하여 인터페이스 스펙 노출을 차단한다.
# 인터페이스 스펙은 dev 환경 Swagger UI 또는 SAP 인바운드 가이드 문서를 기준으로 한다.
# ---------------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: "prod"
  # prod 에서는 show-sql(System.out 직접 SQL 출력)도 기본 off. base 기본이 true 라
  # logging.level.org.hibernate.SQL 을 낮춰도 이 경로로 SQL 이 계속 찍힌다.
  jpa:
    show-sql: ${JPA_SHOW_SQL:false}
  # prod 전용 HikariCP 풀 상향. base 기본(pool 5 / idle 2)은 local·dev 부하 기준이라
  # 운영 스파이크(출근·마감 동시 몰림) 시 커넥션풀 고갈로 요청이 직렬화된다.
  # RDS(db.t4g.xlarge, max_connections ≈ 1,600)는 여유가 크므로 prod 만 20 으로 올린다.
  # EB 환경변수 용량 제약으로 값은 코드에 못 박고, 필요 시 환경변수로 override 가능.
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# prod 로깅 기본값 — base document(root INFO / 앱·security·SQL DEBUG, bind TRACE)는
# 개발 편의용 기본이라 운영에 그대로 뜨면 매 요청 SQL·바인딩값을 문자열로 조립해
# 힙·GC·CPU 를 상시 낭비한다(운영 메모리 압박 사건). prod document 에서 안전한
# 기본을 코드로 못 박아 환경변수 누락 시에도 상시 DEBUG 로 뜨지 않게 한다.
# 필요 시 EB 환경 속성(LOG_LEVEL_*)으로 여전히 override 가능하며, 재배포 없는 런타임
# 임시 상향은 개발자 도구 화면(POST /api/v1/admin/tools/log-levels, 시스템 관리자 전용)
# 으로 처리한다 — actuator loggers 는 security 체인 밖이라 일부러 열지 않는다.
logging:
  level:
    com.otoki.powersales: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:INFO}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_HIBERNATE_BIND:INFO}

app:
  # prod 환경에서 발화할 스케줄 잡 (전역 @EnableScheduling ON + 잡별 enabled 게이팅, 기본 OFF).
  # 전문행사조 마스터 → 사원 행사조 정합 (SF Batch_PPTMaster1/2 동등) 을 prod 에서 활성화한다.
  # sync: 매시간 44분, expire: 매일 23:30 (cron 은 배치 클래스 @Scheduled 에 고정).
  batch:
    # 클레임/물류클레임 상태 업데이트 sync — 단일 잡(ClaimMasterSyncBatch, 매시 정각)으로 통합, 도메인별 개별 on/off.
    # 잡 빈 게이팅 = claim-master.sync.enabled. 두 도메인 처리 여부는 ClaimMasterSyncBatchService 가 각 플래그로 재판정한다.
    # (claim-master.sync.enabled=false 로 잡을 끄면 logistics 도메인도 함께 멎으니, 물류만 돌리려면 claim 은 켠 채 로직 조정.)
    claim-master:
      sync:
        enabled: true
    logistics-claim-master:
      sync:
        enabled: true
    ppt-master:
      sync:
        enabled: true
      expire:
        enabled: true
    # ORORA 매출이력 RDS 적재 배치 (일매출 매일 04:30 / 월매출 매월 3일 05:00).
    orora:
      daily:
        enabled: true
      monthly:
        enabled: true
    # 진열 전월매출 배치 (매일 02:00).
    display:
      last-month-revenue:
        enabled: true
    # 일정 평균매출 배치 (매월 1일 03:00).
    mfeis:
      this-month-revenue:
        enabled: true
    # 목표마스터 sync 배치 (매시 정각).
    sales-progress-rate-master:
      sync:
        enabled: true
    # 거래처 좌표변환 배치 (매일 02:00, Naver Geocode).
    account-naver-geocode:
      enabled: true
    # 연기예약 처리 배치 (매일 00:00).
    postponed-appointment:
      enabled: true
    # 유통기한 만료 FCM 알림 배치 (매일 09:00 KST, alarm_date=당일 담당 여사원). 레거시 Heroku UTC 0 0 0 = KST 09:00 정합.
    # 실제 발송은 app.push.fcm.enabled + credential 필요.
    product-expiration-alert:
      enabled: true
    # SF 전송실패 건 재전송 배치 (매시간 50분). 제품클레임 + 물류클레임 SEND_FAILED 이고 시도횟수 상한 미만 건 재전송.
    sf-resend:
      enabled: true
  # SF outbound 재전송 시도횟수 상한 (초과 건은 영구 실패로 간주하고 재전송 제외).
  sf:
    resend:
      max-attempt: 3
  # SAP outbound 전송 배치 (여사원일정 매일 01:00 / 진열마스터 매일 23:00 / PPT마스터 매일 12:00).
  sap:
    outbound:
      team-member-schedule:
        enabled: true
      display:
        enabled: true
      ppt-master:
        enabled: true

---
# ---------------------------------------------------------------------------
# dev 전용 — 단말 바인딩 면제 사번 추가
# 00000009 는 base 에서 전 환경 공통 면제. dev 에서는 20030239, 20230001 도 추가로
# 면제한다 (운영에는 적용하지 않음). EB 에 UUID_CHECK_EXCLUDED 환경변수를 설정하지
# 않아야 이 값이 유효하다.
# ---------------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: "dev"

app:
  auth:
    uuid-check:
      excluded-employee-codes: "00000009,20030239,20230001"
  # dev 환경에서 발화할 스케줄 잡 (전역 @EnableScheduling ON + 잡별 enabled 게이팅, 기본 OFF).

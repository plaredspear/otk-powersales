spring:
  application:
    name: otoki-powersales-backend

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/otoki}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:5}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      connection-timeout: 30000

  jpa:
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:true}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        default_schema: salesforce2

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

  flyway:
    schemas: salesforce2
    baseline-on-migrate: true
    baseline-version: 0
    enabled: true

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}

jwt:
  secret: ${JWT_SECRET:otoki-internal-dev-secret-key-change-in-production-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

aws:
  s3:
    bucket:
      name: ${AWS_S3_BUCKET_NAME:otoki-bucket}

orora:
  mock:
    enabled: ${ORORA_MOCK_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

app:
  domain:
    api: ${API_DOMAIN:}
    admin: ${ADMIN_DOMAIN:}
    sap: ${SAP_DOMAIN:}
  aws:
    s3:
      bucket: ${S3_BUCKET:}

sap:
  auth:
    api-key: ${SAP_API_KEY:dev-sap-api-key-for-local-testing}
    allowed-ips: ${SAP_ALLOWED_IPS:}
  outbound:
    base-url: ${SAP_OUTBOUND_BASE_URL:}
    username: ${SAP_OUTBOUND_USERNAME:}
    password: ${SAP_OUTBOUND_PASSWORD:}
    connect-timeout-ms: ${SAP_OUTBOUND_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${SAP_OUTBOUND_READ_TIMEOUT_MS:120000}
    retry:
      max-attempts: ${SAP_OUTBOUND_RETRY_MAX_ATTEMPTS:3}
      delay-ms: ${SAP_OUTBOUND_RETRY_DELAY_MS:1000}

device:
  binding:
    enabled: true
    excluded-ids: ""

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.otoki.powersales: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_HIBERNATE_BIND:TRACE}

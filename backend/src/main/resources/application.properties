spring.application.name=otk-pwrs-backend

# ---------------------------------------------------------------------------
# DB/Redis 연결은 현재 단계에서 제외된 상태다. 의존성(spring-boot-starter-data-jpa,
# spring-boot-starter-data-redis, postgresql, spring-cloud-aws-starter-secrets-manager)
# 이 build.gradle.kts 에서 빠져 있으므로 auto-config exclude 도 불필요하다.
# 향후 DB/Redis 를 복구할 때 build.gradle.kts 주석을 해제하고, local/테스트
# 환경에서는 아래와 같이 auto-config 를 제외해 기동 실패를 막도록 복원한다.
#
# spring.autoconfigure.exclude=\
#   org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
#   org.springframework.boot.data.jpa.autoconfigure.HibernateJpaAutoConfiguration,\
#   org.springframework.boot.data.redis.autoconfigure.RedisAutoConfiguration,\
#   org.springframework.boot.data.redis.autoconfigure.RedisRepositoriesAutoConfiguration
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Actuator — /actuator/health 만 노출. EB Load Balancer 헬스체크 경로와 동일.
# DB/Redis 컴포넌트가 없어 details 는 사실상 status 만 렌더링된다.
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ---------------------------------------------------------------------------
# 앱 구성 값 (모든 스테이지 공통 placeholder). 실제 값은 프로파일 별 파일에서
# 채워지거나 env var 로 주입된다.
# ---------------------------------------------------------------------------
app.stage=${STAGE:local}
app.aws.region=${AWS_REGION:ap-northeast-2}

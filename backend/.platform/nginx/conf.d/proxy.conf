# nginx(EB 리버스 프록시) 업로드 본문 크기 상한.
# 모바일 앱 패키지(APK/IPA) 업로드 시, 기본값(1MB)으로는 nginx 가
# 요청을 Spring 까지 보내기 전에 413(Content Too Large)로 차단한다.
# Spring multipart 상한(application.yml: 512MB)과 동일하게 맞춰
# nginx → Spring 두 게이트의 한도를 일치시킨다.
#
# Amazon Linux 2 / 2023 플랫폼의 nginx 는 이 디렉터리(.platform/nginx/conf.d)의
# *.conf 를 http 컨텍스트에서 자동 include 한다.
client_max_body_size 512M;

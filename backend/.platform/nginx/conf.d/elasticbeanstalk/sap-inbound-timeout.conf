# SAP 인바운드 전용 nginx 프록시 설정 — 대량 배치 요청의 장시간 처리 대응.
#
# 배경:
#   SAP → (내부 NLB) → nginx → Spring(:8080) 경로에서, 대량 ERP 주문 인바운드
#   (/api/v1/sap/erp-order 등)는 건수에 따라 처리에 수십초~수분이 걸릴 수 있다.
#   nginx 기본 proxy_read_timeout(60초)을 초과하면 nginx 가 백엔드 응답을 기다리다
#   504 로 연결을 끊어, SAP 측에는 실패(응답 없는 오류)로 표면화된다.
#
# 조치:
#   /api/v1/sap/ 경로에만 proxy_read/send_timeout 을 60초 → 300초로 상향한다.
#   모바일/웹/관리자 API 는 EB 기본 location(/) 의 60초 격벽을 그대로 유지해
#   장애 확산을 막는다 (SAP 만 장시간 연결을 허용하는 bulkhead 격리).
#   NLB 리스너 유휴 제한(3000초)보다 짧게 두어, 응답 지연 시 nginx 가 먼저
#   504 로 끊어 연결이 방치되지 않게 한다.
#
# 적용 위치:
#   EB(Amazon Linux 2023) Docker 플랫폼의 nginx 는 이 디렉터리
#   (.platform/nginx/conf.d/elasticbeanstalk/) 의 *.conf 를 EB 가 생성하는
#   server 블록 **안**에 include 한다 (http 컨텍스트인 상위 conf.d/ 와 다름).
#   따라서 여기서는 location 지시어를 사용할 수 있다.
#
# 주의:
#   별도 location 블록은 EB 기본 location(/) 의 proxy 설정을 상속하지 않으므로,
#   proxy_pass 대상(upstream) 과 프록시 헤더(특히 X-Forwarded-For / X-Real-IP)를
#   여기서 다시 명시한다. X-Forwarded-For 가 누락되면 SAP IP allowlist 필터
#   (ClientIpResolver)가 잘못된 IP 로 판단해 인증이 깨진다.
#
#   upstream 이름 `docker` 는 EB Docker 플랫폼이 자동 생성한다:
#     /etc/nginx/conf.d/elasticbeanstalk-nginx-docker-upstream.conf
#       upstream docker { server <container-ip>:<첫 EXPOSE 포트>; keepalive 256; }
#   본 프로젝트 Dockerfile 의 `EXPOSE 8080` → upstream 대상 포트 = 8080.
#   (keepalive 를 upstream 이 쓰므로 proxy_http_version 1.1 + Connection "" 로 재사용.)
#   배포 후 `sudo nginx -T | grep -E "upstream docker|proxy_pass"` 로 검증한다.

# `^~` : 이 prefix 가 매칭되면 정규식 location 검사를 건너뛴다. EB 기본 server 블록에
# 정규식 location 이 추가되더라도 SAP 경로가 그쪽으로 새지 않도록 격리를 보장한다
# (web/mobile 경로는 이 prefix 와 겹치지 않아 영향 없음).
location ^~ /api/v1/sap/ {
    proxy_pass          http://docker;
    proxy_http_version  1.1;

    proxy_set_header    Connection          "";
    proxy_set_header    Host                $host;
    proxy_set_header    X-Real-IP           $remote_addr;
    proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto   $scheme;

    # 대량 배치 처리 대응. NLB 리스너 유휴 제한(3000초)보다 짧게 두어,
    # 응답 지연 시 nginx 가 먼저 504 로 명확히 끊도록 한다 (연결 방치 방지).
    proxy_connect_timeout   75s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;
}

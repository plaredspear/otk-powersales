# 주문 취소 전용 nginx 프록시 설정 — SAP 동기 호출 장시간 처리 대응.
#
# 배경:
#   주문 취소(POST /api/v1/mobile/me/order-requests/{id}/cancel)는 백엔드가 SAP(SD03051)를
#   동기 호출한다 — 취소 라인 전체를 단일 payload 로 묶어 1회. SD03051 은 정상 처리에도
#   수십초가 걸려, 백엔드 SAP read-timeout 을 300초로 상향했다.
#   그러나 이 요청은 (아웃바운드 SAP 경로 /api/v1/sap/ 와 달리) 클라이언트 인바운드
#   경로라, EB 기본 location(/) 의 nginx proxy_read_timeout(60초) 격벽에 걸린다.
#   60초를 초과하면 nginx 가 백엔드 응답을 기다리다 504 로 끊어, 앱에는 실패로 표면화되고
#   백엔드/SAP 는 취소를 계속 완료 → 사용자 재취소 → SAP 중복 전송이 유발된다.
#
# 조치:
#   취소 엔드포인트(.../order-requests/{id}/cancel)에만 proxy_read/send_timeout 을
#   60초 → 300초로 상향한다. 백엔드 SAP read-timeout(300초)과 정합. 같은 prefix 아래
#   목록/상세/재전송(GET .../order-requests, .../{id}, POST .../{id}/resend) 등 나머지
#   경로와 다른 모바일/웹/관리자 API 는 EB 기본 location(/) 의 60초 격벽을 그대로 유지해
#   장애 확산을 막는다 (bulkhead 격리 — sap-inbound-timeout.conf 와 동일 철학).
#   {id} 가 가변이라 `/cancel` 접미만 특정하려면 prefix(^~)로는 불가 → 정규식 location 사용.
#
# 적용 위치:
#   EB(Amazon Linux 2023) Docker 플랫폼의 nginx 는 이 디렉터리
#   (.platform/nginx/conf.d/elasticbeanstalk/) 의 *.conf 를 EB 가 생성하는 server 블록
#   **안**에 include 한다. 따라서 여기서 location 지시어를 사용할 수 있다.
#
# 주의:
#   별도 location 블록은 EB 기본 location(/) 의 proxy 설정을 상속하지 않으므로,
#   proxy_pass 대상(upstream docker)과 프록시 헤더를 여기서 다시 명시한다
#   (sap-inbound-timeout.conf 와 동일 이유). upstream 이름 `docker` 는 EB Docker 플랫폼이
#   자동 생성하며(EXPOSE 8080 → target :8080), keepalive 재사용을 위해
#   proxy_http_version 1.1 + Connection "" 로 둔다.
#
#   ALB idle timeout(350초, alb-idle-timeout.config) 보다 짧게 두어, 응답 지연 시 nginx 가
#   먼저 504 로 명확히 끊도록 한다 (연결 방치 방지).

# 취소 엔드포인트만 정확히 매칭한다: .../order-requests/{id}/cancel.
# {id} 는 숫자(orderRequestId, Long)라 [0-9]+ 로 특정한다. 정규식 location 이라 같은
# prefix 의 목록/상세/재전송은 여기에 걸리지 않고 EB 기본 location(60초)을 그대로 탄다.
location ~ ^/api/v1/mobile/me/order-requests/[0-9]+/cancel$ {
    proxy_pass          http://docker;
    proxy_http_version  1.1;

    proxy_set_header    Connection          "";
    proxy_set_header    Host                $host;
    proxy_set_header    X-Real-IP           $remote_addr;
    proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto   $scheme;

    proxy_connect_timeout   75s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;
}

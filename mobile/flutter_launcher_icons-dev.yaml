# dev flavor 런처 아이콘 — 캐릭터(여사원) on 오뚜기 블루 배경(#0A309E, AppColors.otokiBlue)
# + 좌상단 검정 DEV / 우상단 빨강 NEW 삼각형 코너 배지.
# prod 와 홈화면에서 구분되도록 코너 배지로 차별화.
# 적용/갱신: `dart run flutter_launcher_icons` (dev/prod 파일을 함께 자동 처리)
flutter_launcher_icons:
  image_path: assets/icon/app_icon_dev.png
  ios: true
  remove_alpha_ios: true
  android: true
  adaptive_icon_background: "#0A309E"
  adaptive_icon_foreground: assets/icon/app_icon_dev_fg.png
  adaptive_icon_foreground_inset: 20

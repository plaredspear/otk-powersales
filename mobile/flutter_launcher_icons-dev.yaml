# dev flavor 런처 아이콘 — 캐릭터(여사원) on 회색 배경(#8e8e93) + 우하단 DEV 리본.
# prod 와 홈화면에서 확실히 구분되도록 배경색 + 리본으로 차별화.
# 적용/갱신: `dart run flutter_launcher_icons` (dev/prod 파일을 함께 자동 처리)
flutter_launcher_icons:
  image_path: assets/icon/app_icon_dev.png
  ios: true
  remove_alpha_ios: true
  android: true
  adaptive_icon_background: "#8e8e93"
  adaptive_icon_foreground: assets/icon/app_icon_dev_fg.png
  adaptive_icon_foreground_inset: 20

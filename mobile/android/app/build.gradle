plugins {
    id "com.android.application"
    id "kotlin-android"
    // Flutter Gradle Plugin 은 Android / Kotlin Gradle plugin 다음에 적용해야 한다.
    id "dev.flutter.flutter-gradle-plugin"
}

// FCM: google-services.json 이 존재할 때만 플러그인 적용.
// 설정 파일을 아직 추가하지 않은 상태에서도 빌드가 깨지지 않도록 함.
// flavor 환경에서는 google-services 플러그인이 다음 경로를 자동 탐색한다:
//   - 공통:   android/app/google-services.json
//   - dev:    android/app/src/dev/google-services.json
//   - prod:   android/app/src/prod/google-services.json
// 위 경로 중 하나라도 존재하면 플러그인을 적용한다.
def hasGoogleServices = file("google-services.json").exists() ||
        file("src/dev/google-services.json").exists() ||
        file("src/prod/google-services.json").exists()
if (hasGoogleServices) {
    apply plugin: "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// release 서명 설정. android/key.properties 가 존재할 때만 release keystore 를 적용한다.
// 파일이 없으면(개발자 로컬 / CI 미설정) release 도 debug 키로 서명되어 빌드가 깨지지 않는다.
// key.properties 와 *.jks 는 .gitignore 로 추적 제외 — 절대 커밋하지 않는다.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.otoki.pwrs.mobile"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // 기본(공통) Application ID. 환경별 접미사는 productFlavors 에서 부여.
        applicationId "com.otoki.pwrs.mobile"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    // 직접 배포(웹 다운로드)용 APK 는 ARM 2종(arm64-v8a + armeabi-v7a)만 포함하고
    // x86_64(에뮬레이터 전용, 약 28MB)는 제외한다. 구형 32비트폰 호환은 유지.
    // Flutter Gradle 플러그인이 defaultConfig.ndk.abiFilters 를 자체 ABI 목록으로 덮어써
    // 무효화하므로, 패키징 단계에서 x86_64 .so 를 직접 제외한다(libapp.so / ML Kit libbarhopper).
    packagingOptions {
        jniLibs {
            excludes += ['lib/x86_64/**', 'lib/x86/**']
        }
    }

    // dev/prod 환경 분리. 한 기기에 두 앱을 동시에 설치할 수 있도록
    // dev 는 applicationId 에 ".dev" 접미사를 부여한다.
    // 앱 표시 이름은 resValue 로 주입해 AndroidManifest 의 @string/app_name 이 참조한다.
    flavorDimensions "env"
    productFlavors {
        dev {
            dimension "env"
            applicationIdSuffix ".dev"
            resValue "string", "app_name", "파워세일즈(개발)"
        }
        prod {
            dimension "env"
            resValue "string", "app_name", "파워세일즈"
        }
    }

    // android/key.properties 가 있으면 release keystore 로 서명 설정을 등록한다.
    signingConfigs {
        if (hasKeystore) {
            release {
                storeFile rootProject.file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            // key.properties 가 있으면 release keystore, 없으면 debug 키로 서명한다.
            // debug 서명 APK 는 정식 배포(동일 패키지 업데이트)에 사용하면 안 된다.
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {}

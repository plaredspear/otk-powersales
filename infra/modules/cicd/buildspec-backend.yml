version: 0.2

env:
  variables:
    GRADLE_USER_HOME: "/root/.gradle"

phases:
  pre_build:
    commands:
      - echo "=== ECR Login ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY_URL
      - IMAGE_TAG="${SHORT_COMMIT_SHA:-${CODEBUILD_RESOLVED_SOURCE_VERSION:=latest}}"
      - FULL_IMAGE="$ECR_REPOSITORY_URL:$IMAGE_TAG"
      - LATEST_IMAGE="$ECR_REPOSITORY_URL:latest"

  build:
    commands:
      - echo "=== Docker Build ==="
      - >
        docker build
        --cache-from $LATEST_IMAGE
        --build-arg BUILDKIT_INLINE_CACHE=1
        -t $FULL_IMAGE
        -t $LATEST_IMAGE
        -f backend/Dockerfile
        backend/

  post_build:
    commands:
      - echo "=== Push to ECR ==="
      - docker push $FULL_IMAGE
      - docker push $LATEST_IMAGE

      - echo "=== Register New Task Definition ==="
      - TASK_FAMILY="${PROJECT}-${ENVIRONMENT}-backend"
      - >
        CURRENT_TASK_DEF=$(aws ecs describe-task-definition
        --task-definition $TASK_FAMILY
        --query 'taskDefinition'
        --output json)
      - >
        NEW_TASK_DEF=$(echo "$CURRENT_TASK_DEF" | jq
        --arg img "$FULL_IMAGE"
        '.containerDefinitions[0].image = $img |
        {family, containerDefinitions, taskRoleArn, executionRoleArn,
        networkMode, volumes, placementConstraints, requiresCompatibilities,
        cpu, memory}
        | with_entries(select(.value != null))')
      - >
        NEW_REVISION=$(aws ecs register-task-definition
        --cli-input-json "$NEW_TASK_DEF"
        --query 'taskDefinition.taskDefinitionArn'
        --output text)
      - echo "New task definition = $NEW_REVISION"

      - echo "=== Update ECS Service ==="
      - >
        aws ecs update-service
        --cluster $ECS_CLUSTER_NAME
        --service $ECS_SERVICE_NAME
        --task-definition $NEW_REVISION
        --force-new-deployment
        --region $AWS_DEFAULT_REGION

      - echo "=== Backend deploy complete ==="

cache:
  paths:
    - "/root/.gradle/caches/**/*"
    - "/root/.gradle/wrapper/**/*"
